services:
  app:
    image: your-dockerhub-username/final-devops:latest
    container_name: devops_app
    ports:
      - "80:80"
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    container_name: devops_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: devops_db
      MYSQL_USER: devops
      MYSQL_PASSWORD: devops123
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 devops_app
    restart: always

volumes:
  db_data: